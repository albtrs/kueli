services:
  kueli-web:
    build:
      context: ./web
      dockerfile: Dockerfile.production
    container_name: kueli-web
    expose:
      - 3000
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped
    networks:
      - apps_net
  kueli-api:
    build:
      context: ./api
      dockerfile: Dockerfile.production
    container_name: kueli-api
    expose:
      - 8080
    volumes:
      - ./data/uploads:/data/uploads
      - ./data/prisma:/data/prisma
    environment:
      - TZ=Asia/Tokyo
      - APP_ENV=production
      - PORT=8080
      - DATABASE_PATH=/data/prisma/app.db
      - UPLOADS_DIR=/data/uploads
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    networks:
      - apps_net
networks:
  apps_net:
    external: true
