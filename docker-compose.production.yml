services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: kueli-app
    ports:
      - "3001:3000"
    volumes:
      # データ永続化のみマウント（コードはイメージに含まれる）
      - ./data/uploads:/app/public/uploads
      - ./data/prisma:/app/prisma/db
    environment:
      - TZ=Asia/Tokyo
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/db/app.db
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    # ヘルスチェック
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ユーザー管理用（必要時のみ起動）
  admin:
    image: node:22-alpine
    container_name: kueli-admin
    working_dir: /app
    profiles:
      - admin
    volumes:
      - ./app:/app
      - ./data/prisma:/app/prisma/db
    environment:
      - DATABASE_URL=file:/app/prisma/db/app.db
    command: sh -c "npm install --silent && npx prisma generate && sh"
    stdin_open: true
    tty: true
