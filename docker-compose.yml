services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kueli-web
    working_dir: /workspace/web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3001:3000"
    volumes:
      - .:/workspace
      - /workspace/web/node_modules
    environment:
      - TZ=Asia/Tokyo
      - NODE_ENV=development
      - VITE_API_INTERNAL_ORIGIN=http://api:8080
    tty: true
    stdin_open: true
    restart: unless-stopped
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: kueli-api
    working_dir: /workspace
    ports:
      - "8081:8080"
    volumes:
      - ./api:/workspace
      - ./data/prisma:/workspace/data/prisma
      - ./data/uploads:/workspace/data/uploads
    environment:
      - TZ=Asia/Tokyo
      - APP_ENV=development
      - PORT=8080
      - DATABASE_PATH=/workspace/data/prisma/app.db
      - UPLOADS_DIR=/workspace/data/uploads
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    tty: true
    stdin_open: true
    restart: unless-stopped
